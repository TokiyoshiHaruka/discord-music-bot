networks:
    1panel-network:
        external: true
services:
    discord-music-bot:
        build:
            context: ./bot
        container_name: ${CONTAINER_NAME}
        depends_on:
            discord-lavalink:
                condition: service_started
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            DISCORD_TOKEN: ${DISCORD_TOKEN}
            DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
            DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
            LAVALINK_HOST: ${LAVALINK_HOST}
            LAVALINK_PORT: ${LAVALINK_PORT}
            LAVALINK_PASSWORD: ${LAVALINK_PASSWORD}
            DEFAULT_VOLUME: ${DEFAULT_VOLUME}
            AUDIO_NORMALIZATION_PRE_GAIN: ${AUDIO_NORMALIZATION_PRE_GAIN}
            AUDIO_NORMALIZATION_MAX_AMPLITUDE: ${AUDIO_NORMALIZATION_MAX_AMPLITUDE}
            LOG_LEVEL: ${LOG_LEVEL}
        image: local/discord-music-bot:latest
        labels:
            createdBy: Apps
        networks:
            - 1panel-network
        restart: always
    discord-lavalink:
        container_name: ${CONTAINER_NAME}-lavalink
        build:
            context: ./lavalink
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            LAVALINK_PASSWORD: ${LAVALINK_PASSWORD}
            SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
            SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
            APPLE_MUSIC_MEDIA_API_TOKEN: ${APPLE_MUSIC_MEDIA_API_TOKEN}
            _JAVA_OPTIONS: -Xmx768m
        image: local/discord-lavalink-ytdlp:latest
        labels:
            createdBy: Apps
        networks:
            1panel-network:
                aliases:
                    - discord-lavalink
        restart: always
        volumes:
            - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
            - ./lavalink/logs:/opt/Lavalink/logs
            - ./lavalink/plugins:/opt/Lavalink/plugins
